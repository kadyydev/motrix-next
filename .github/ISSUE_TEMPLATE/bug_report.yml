name: 🐛 Bug Report
description: Report a bug in Motrix Next
title: '[BUG]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue!
        Please check [existing issues](https://github.com/AnInsomniacy/motrix-next/issues) before creating a new one.
        Please reproduce the issue on the latest release or latest beta before filing. Reports from older versions may be closed without further investigation.
        Use GitHub Discussions for questions. Use the extension repository for browser-extension-only issues, and Aria2 Next for engine-only issues.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is and what you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Motrix Next Version
      description: 'The full version shown in the About panel. Reports must be reproduced on the latest release or latest beta.'
      placeholder: '3.4.1'
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Issue Source
      description: |
        Select Motrix Next app only for desktop-app bugs.

        Browser extension issues must be filed in:<br>
        https://github.com/AnInsomniacy/motrix-next-extension

        Aria2 Next engine issues must be filed in:<br>
        https://github.com/AnInsomniacy/aria2-next

        Misfiled issues may be closed here.
      options:
        - Motrix Next App
        - Browser Extension
        - RPC / Third-Party Parser
        - Aria2 Next Engine
        - Not Sure
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows (x64)
        - Windows (ARM64)
        - Linux (x64 / AppImage)
        - Linux (x64 / deb)
        - Linux (ARM64 / AppImage)
        - Linux (ARM64 / deb)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: 'e.g. macOS 15.3, Windows 11 24H2, Ubuntu 24.04'
      placeholder: 'macOS 15.3'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Diagnostic Logs
      description: |
        Please export logs via **Advanced Settings → Export Diagnostic Logs**. Keep **Motrix Next Log Level** at `debug` and **Aria2 Next Log Level** at `notice` unless maintainers ask otherwise.
        Upload the exported `.zip` directly. Do not extract it.
        If you must redact sensitive data, keep the same ZIP file structure and filenames when repacking.
        Do not paste only a few log lines unless a maintainer asks for that.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        **Required.** Attach screenshots showing the issue. Screen recordings are especially helpful for UI and interaction bugs.
    validations:
      required: true

  - type: checkboxes
    id: validations
    attributes:
      label: Validations
      options:
        - label: I have searched existing issues and tested with the latest beta release when possible.
          required: true
        - label: I have uploaded the exported diagnostic `.zip` directly, or kept the same ZIP structure after redaction.
          required: true
        - label: This is a reproducible Motrix Next desktop-app bug. Questions belong in [GitHub Discussions](https://github.com/AnInsomniacy/motrix-next/discussions), browser-extension-only issues belong in [motrix-next-extension](https://github.com/AnInsomniacy/motrix-next-extension), and engine-only issues belong in [aria2-next](https://github.com/AnInsomniacy/aria2-next).
          required: true
